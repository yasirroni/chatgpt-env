name: Build Julia runtime bundle
run-name: Build Julia 1.12.4 runtime for Linux x86-64 by @${{ github.actor }}

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-runtime
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      ENVIRONMENT_NAME: runtime
      JULIA_VERSION: 1.12.4

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes zstd

      - name: Build runtime bundle
        run: scripts/build_runtime_bundle.sh

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: scripts/publish_release.sh runtime
