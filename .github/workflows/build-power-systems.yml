name: Build power systems environment
run-name: Build power-systems for Julia 1.12.4 by @${{ github.actor }}

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-power-systems
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    env:
      ENVIRONMENT_NAME: power-systems
      JULIA_VERSION: 1.12.4
      JULIA_CPU_TARGET: generic
      JULIA_NUM_PRECOMPILE_TASKS: 4

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Julia
        uses: julia-actions/setup-julia@v3
        with:
          version: ${{ env.JULIA_VERSION }}
          arch: x64

      - name: Install packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes zstd

      - name: Build and validate bundle
        run: scripts/build_environment.sh "$ENVIRONMENT_NAME"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: scripts/publish_release.sh "$ENVIRONMENT_NAME"
